<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>RucksackBot - Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app-layout">
    <aside class="sidebar">
        <h2>🎒 RucksackBot</h2>
        <a href="/">🏠 Home</a>
        <a href="/admin">👑 Admin</a>
    </aside>

    <main class="main-content">
        <div class="login-box">
            <h1>🔐 Login</h1>
            <p>Bitte gib dein Admin-Passwort ein.</p>

            <form onsubmit="login(); return false;">
                <div class="password-field">
                    <input
                        type="password"
                        id="tokenInput"
                        placeholder="Admin Passwort"
                        autofocus>

                    <span id="eyeButton" onclick="togglePassword()">👁️</span>
                </div>

                <button type="submit">Anmelden</button>
            </form>

            <p id="message"></p>
        </div>
    </main>
</div>

<script src="/js/login.js"></script>
</body>
</html>
